# Backend: compile check + Docker build, Trivy scan, Docker Hub push (on main push)
#
# Secrets (repo → Settings → Actions):
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN
# Optional variable: DOCKERHUB_REPO (default: cn-backend)

name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

      - name: TypeScript compile
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: compile
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Docker image name
        id: image
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_REPO: ${{ vars.DOCKERHUB_REPO }}
        run: |
          REPO="${DH_REPO:-cn-backend}"
          # Trim CR/LF/spaces — hidden chars break Trivy/Docker "could not parse reference"
          DH_USER=$(printf '%s' "$DH_USER" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          REPO=$(printf '%s' "$REPO" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -n "$DH_USER" ]; then
            printf '%s\n' "full=${DH_USER}/${REPO}" >> "$GITHUB_OUTPUT"
            printf '%s\n' "can_push=true" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "full=cn-backend-ci/${REPO}" >> "$GITHUB_OUTPUT"
            printf '%s\n' "can_push=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_USERNAME empty — using local tag only; set secrets to push."
          fi

      - name: Explain Docker Hub push
        run: |
          echo "can_push=${{ steps.image.outputs.can_push }} | event=${{ github.event_name }} | ref=${{ github.ref }}"
          echo "Push runs only on: push to main + DOCKERHUB_USERNAME + DOCKERHUB_TOKEN."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: |
            ${{ steps.image.outputs.full }}:latest
            ${{ steps.image.outputs.full }}:${{ github.sha }}
            cn-backend:ci-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy scans a fixed local name (avoids parse errors from masked / odd registry refs)
      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: cn-backend:ci-scan
          scanners: vuln
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          exit-code: "0"
          ignore-unfixed: true

      - name: Log in to Docker Hub
        if: steps.image.outputs.can_push == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: steps.image.outputs.can_push == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "${{ steps.image.outputs.full }}:${{ github.sha }}"
          docker push "${{ steps.image.outputs.full }}:latest"
